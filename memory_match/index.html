<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Memory Magic!</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: 'Comic Sans MS', 'Chalkboard SE', cursive;
      background: linear-gradient(135deg, #ff9ff3, #ffeaa7, #a29bfe);
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      padding: 20px;
    }

    h1 {
      font-size: 2.5em;
      color: white;
      text-shadow: 0 3px 10px rgba(0,0,0,0.2);
      margin-bottom: 6px;
    }

    .back-btn {
      position: absolute;
      top: 18px;
      left: 18px;
      background: white;
      border: none;
      border-radius: 50px;
      padding: 8px 18px;
      font-family: inherit;
      font-size: 1em;
      cursor: pointer;
      box-shadow: 0 3px 10px rgba(0,0,0,0.15);
      text-decoration: none;
      color: #555;
    }
    .back-btn:hover { background: #f0f0f0; }

    .stats {
      display: flex;
      gap: 20px;
      margin-bottom: 20px;
      font-size: 1.1em;
      color: white;
      text-shadow: 0 2px 6px rgba(0,0,0,0.2);
    }

    .stat-box {
      background: rgba(255,255,255,0.3);
      border-radius: 15px;
      padding: 8px 18px;
      text-align: center;
    }

    .stat-label { font-size: 0.7em; opacity: 0.85; }
    .stat-value { font-size: 1.5em; font-weight: bold; }

    .grid {
      display: grid;
      grid-template-columns: repeat(4, 1fr);
      gap: 12px;
      max-width: 480px;
      width: 100%;
    }

    .card {
      aspect-ratio: 1;
      cursor: pointer;
      perspective: 600px;
    }

    .card-inner {
      width: 100%;
      height: 100%;
      position: relative;
      transform-style: preserve-3d;
      transition: transform 0.4s ease;
    }

    .card.flipped .card-inner {
      transform: rotateY(180deg);
    }

    .card-front, .card-back {
      position: absolute;
      width: 100%;
      height: 100%;
      border-radius: 16px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 2.5em;
      backface-visibility: hidden;
      -webkit-backface-visibility: hidden;
      box-shadow: 0 4px 15px rgba(0,0,0,0.2);
    }

    .card-back {
      background: linear-gradient(135deg, #6c5ce7, #a29bfe);
      font-size: 1.8em;
      color: white;
    }

    .card-front {
      background: white;
      transform: rotateY(180deg);
    }

    .card.matched .card-front {
      background: linear-gradient(135deg, #55efc4, #00b894);
      animation: celebrate 0.4s ease;
    }

    @keyframes celebrate {
      0%   { transform: rotateY(180deg) scale(1); }
      50%  { transform: rotateY(180deg) scale(1.15); }
      100% { transform: rotateY(180deg) scale(1); }
    }

    .win-screen {
      display: none;
      position: fixed;
      inset: 0;
      background: rgba(0,0,0,0.6);
      align-items: center;
      justify-content: center;
      z-index: 10;
    }

    .win-screen.show { display: flex; }

    .win-box {
      background: white;
      border-radius: 30px;
      padding: 40px;
      text-align: center;
      max-width: 340px;
      animation: popIn 0.4s ease;
    }

    @keyframes popIn {
      from { transform: scale(0.5); opacity: 0; }
      to   { transform: scale(1);   opacity: 1; }
    }

    .win-box h2 { font-size: 2em; margin-bottom: 10px; }
    .win-box p  { color: #666; margin-bottom: 6px; font-size: 1.1em; }

    .play-again-btn {
      margin-top: 20px;
      background: linear-gradient(135deg, #6c5ce7, #a29bfe);
      color: white;
      border: none;
      border-radius: 50px;
      padding: 14px 34px;
      font-family: inherit;
      font-size: 1.2em;
      cursor: pointer;
      box-shadow: 0 4px 15px rgba(108,92,231,0.4);
    }
    .play-again-btn:hover { opacity: 0.9; }

    .stars { font-size: 2.5em; margin: 10px 0; }
  </style>
</head>
<body>

  <a class="back-btn" href="../index.html">⬅ Back</a>

  <h1>🌟 Memory Magic!</h1>

  <div class="stats">
    <div class="stat-box">
      <div class="stat-label">Moves</div>
      <div class="stat-value" id="moves">0</div>
    </div>
    <div class="stat-box">
      <div class="stat-label">Pairs Found</div>
      <div class="stat-value" id="pairs">0 / 8</div>
    </div>
    <div class="stat-box">
      <div class="stat-label">Time</div>
      <div class="stat-value" id="timer">0s</div>
    </div>
  </div>

  <div class="grid" id="grid"></div>

  <div class="win-screen" id="winScreen">
    <div class="win-box">
      <div class="stars">🌟🎉🌟</div>
      <h2>You did it!</h2>
      <p id="winMoves"></p>
      <p id="winTime"></p>
      <p id="winMessage"></p>
      <button class="play-again-btn" onclick="startGame()">Play Again!</button>
    </div>
  </div>

  <script>
    const EMOJIS = ['🦄','🐱','🐶','🐸','🦋','🐼','🦊','🐨'];

    let flipped = [];
    let matched = 0;
    let moves = 0;
    let locked = false;
    let seconds = 0;
    let timerInterval = null;

    function shuffle(arr) {
      return [...arr, ...arr].sort(() => Math.random() - 0.5);
    }

    function startGame() {
      document.getElementById('winScreen').classList.remove('show');
      flipped = [];
      matched = 0;
      moves = 0;
      locked = false;
      seconds = 0;
      clearInterval(timerInterval);

      document.getElementById('moves').textContent = '0';
      document.getElementById('pairs').textContent = '0 / 8';
      document.getElementById('timer').textContent = '0s';

      const cards = shuffle(EMOJIS);
      const grid = document.getElementById('grid');
      grid.innerHTML = '';

      cards.forEach((emoji, i) => {
        const card = document.createElement('div');
        card.className = 'card';
        card.dataset.emoji = emoji;
        card.dataset.index = i;
        card.innerHTML = `
          <div class="card-inner">
            <div class="card-back">✨</div>
            <div class="card-front">${emoji}</div>
          </div>`;
        card.addEventListener('click', () => flipCard(card));
        grid.appendChild(card);
      });

      timerInterval = setInterval(() => {
        seconds++;
        document.getElementById('timer').textContent = seconds + 's';
      }, 1000);
    }

    function flipCard(card) {
      if (locked) return;
      if (card.classList.contains('flipped')) return;
      if (card.classList.contains('matched')) return;

      card.classList.add('flipped');
      flipped.push(card);

      if (flipped.length === 2) {
        locked = true;
        moves++;
        document.getElementById('moves').textContent = moves;
        checkMatch();
      }
    }

    function checkMatch() {
      const [a, b] = flipped;
      if (a.dataset.emoji === b.dataset.emoji) {
        a.classList.add('matched');
        b.classList.add('matched');
        matched++;
        document.getElementById('pairs').textContent = matched + ' / 8';
        flipped = [];
        locked = false;
        if (matched === 8) {
          clearInterval(timerInterval);
          setTimeout(showWin, 600);
        }
      } else {
        setTimeout(() => {
          a.classList.remove('flipped');
          b.classList.remove('flipped');
          flipped = [];
          locked = false;
        }, 900);
      }
    }

    function showWin() {
      document.getElementById('winMoves').textContent = 'You took ' + moves + ' moves!';
      document.getElementById('winTime').textContent = 'Time: ' + seconds + ' seconds';
      let msg = '';
      if (moves <= 12) msg = '🏆 Amazing memory! You are a superstar!';
      else if (moves <= 18) msg = '⭐ Great job! You are so clever!';
      else msg = '😊 Well done! Keep practising!';
      document.getElementById('winMessage').textContent = msg;
      document.getElementById('winScreen').classList.add('show');
    }

    startGame();
  </script>
</body>
</html>
