<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Games!</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: 'Comic Sans MS', 'Chalkboard SE', cursive;
      background: linear-gradient(135deg, #1a1a2e, #16213e, #0f3460);
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 30px 20px;
    }

    h1 {
      color: white;
      font-size: 2.8em;
      margin-bottom: 8px;
      text-shadow: 0 4px 15px rgba(0,0,0,0.4);
    }

    .subtitle {
      color: rgba(255,255,255,0.6);
      font-size: 1em;
      margin-bottom: 40px;
    }

    .games-grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(220px, 1fr));
      gap: 20px;
      max-width: 800px;
      width: 100%;
    }

    .game-card {
      background: white;
      border-radius: 25px;
      padding: 30px 20px;
      text-align: center;
      text-decoration: none;
      color: #333;
      box-shadow: 0 10px 30px rgba(0,0,0,0.3);
      transition: transform 0.15s, box-shadow 0.15s;
      display: block;
    }

    .game-card:hover {
      transform: translateY(-6px) scale(1.02);
      box-shadow: 0 18px 40px rgba(0,0,0,0.4);
    }

    .game-card:active {
      transform: scale(0.97);
    }

    .game-emoji {
      font-size: 3.5em;
      display: block;
      margin-bottom: 12px;
    }

    .game-title {
      font-size: 1.2em;
      font-weight: bold;
      margin-bottom: 6px;
      color: #222;
    }

    .game-desc {
      font-size: 0.85em;
      color: #888;
      line-height: 1.4;
    }

    .coming-soon {
      opacity: 0.5;
      cursor: not-allowed;
      pointer-events: none;
    }

    .badge {
      display: inline-block;
      background: #7c3aed;
      color: white;
      font-size: 0.65em;
      padding: 3px 10px;
      border-radius: 20px;
      margin-top: 8px;
    }
  </style>
</head>
<body>
  <h1>🎮 Games!</h1>
  <p class="subtitle">Pick something to play</p>

  <div class="games-grid">
    <a class="game-card" href="birthday_animal/index.html">
      <span class="game-emoji">🎂</span>
      <div class="game-title">Birthday Animal</div>
      <div class="game-desc">Find out what animal you are based on your birthday!</div>
    </a>

    <!-- Add more game cards here as we build them -->
    <div class="game-card coming-soon">
      <span class="game-emoji">❓</span>
      <div class="game-title">Coming Soon...</div>
      <div class="game-desc">What shall we build next?</div>
      <span class="badge">Your idea!</span>
    </div>
  </div>
</body>
</html>
