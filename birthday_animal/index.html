      font-size: 0.8em;
      color: #aaa;
      text-transform: uppercase;
      letter-spacing: 1px;
      margin-bottom: 10px;
    }

    .category-buttons {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
      justify-content: center;
      margin-bottom: 25px;
    }

      border-radius: 50px;
      background: #f5f5f5;
      color: #666;
      cursor: pointer;
      transition: all 0.15s;
      box-shadow: none;
      margin-bottom: 0;
    }

    .cat-btn:hover {
      border-color: #7c3aed;
      color: #7c3aed;
      transform: none;
      box-shadow: none;
    }

    .cat-btn.active {
      background: linear-gradient(135deg, #7c3aed, #db2777);
      border-color: transparent;
      color: white;
      box-shadow: 0 3px 10px rgba(124,58,237,0.35);
    }

    .inputs {
      display: flex;
      gap: 15px;
      justify-content: center;
      margin-bottom: 25px;
      flex-wrap: wrap;
    }

    .input-group {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 6px;
    }

    label {
      font-size: 0.85em;
      color: #666;
      font-weight: bold;
      text-transform: uppercase;
      letter-spacing: 1px;
    }

    select {
      font-family: inherit;
      font-size: 1.1em;
      padding: 10px 16px;
      border: 3px solid #e0e0e0;
      border-radius: 15px;
      background: #f9f9f9;
      color: #333;
      cursor: pointer;
      transition: border-color 0.2s;
      appearance: none;
      -webkit-appearance: none;
      min-width: 130px;
      text-align: center;
    }

    select:focus {
      outline: none;
      border-color: #7c3aed;
    }

    .find-btn {
      font-family: inherit;
      font-size: 1.2em;
      padding: 14px 35px;
      background: linear-gradient(135deg, #7c3aed, #db2777);
      color: white;
      border: none;
      border-radius: 50px;
      cursor: pointer;
      transition: transform 0.1s, box-shadow 0.2s;
      box-shadow: 0 4px 15px rgba(124, 58, 237, 0.4);
      margin-bottom: 30px;
    }

    .find-btn:hover {
      transform: scale(1.05);
      box-shadow: 0 6px 20px rgba(124, 58, 237, 0.5);
    }

    .find-btn:active {
      transform: scale(0.97);
    }

    .result {
      display: none;
      animation: popIn 0.4s cubic-bezier(0.34, 1.56, 0.64, 1);
    }

    @keyframes popIn {
      from { transform: scale(0.5); opacity: 0; }
      to { transform: scale(1); opacity: 1; }
    }

    .result.show { display: block; }

    .animal-emoji {
      font-size: 5em;
      margin-bottom: 10px;
      display: block;
    }

      border-radius: 20px;
      padding: 20px 30px;
      margin-bottom: 15px;

      text-transform: uppercase;

      margin-top: 15px;
      box-shadow: none;
      transition: background 0.2s, color 0.2s;

      background: #f5f5f5;
      color: #888;
      border: 2px solid #e0e0e0;

      cursor: pointer;
      margin-top: 10px;
      box-shadow: none;
      margin-bottom: 0;

      color: #7c3aed;

      transform: none;
      box-shadow: none;

      border-radius: 18px;
      border: 2px solid #ede9fe;

</head>

    let currentCategory = 'general';

    function setCategory(cat, btn) {
      currentCategory = cat;
      document.querySelectorAll('.cat-btn').forEach(b => b.classList.remove('active'));
      btn.classList.add('active');
      document.getElementById('current-category').textContent = btn.textContent;
      document.getElementById('result').classList.remove('show');
    }

    function toggleSettings() {
      document.getElementById('settings-panel').classList.toggle('open');
    }

    // Populate days dropdown
    const daySelect = document.getElementById('day');
    for (let d = 1; d <= 31; d++) {
      const opt = document.createElement('option');
      opt.value = d;
      opt.textContent = d;
      daySelect.appendChild(opt);
    }

    function reveal() {
      const month = parseInt(document.getElementById('month').value);
      const day = parseInt(document.getElementById('day').value);

      if (!month || !day) {
        alert("Pick your birth day and month first! 🎂");
        return;
      }

      const adj = adjectives[month];
      const animal = categories[currentCategory][day];

      document.getElementById('emoji').textContent = animal.emoji;
      document.getElementById('animal-name').textContent = `${adj} ${animal.name}`;
      document.getElementById('fun-fact').innerHTML = `<strong>Fun fact:</strong> ${animal.fact}`;

      const result = document.getElementById('result');
      result.classList.remove('show');
      void result.offsetWidth;
      result.classList.add('show');
    }

    function reset() {
      document.getElementById('result').classList.remove('show');
      document.getElementById('month').value = '';
      document.getElementById('day').value = '';
    }
  </script>
